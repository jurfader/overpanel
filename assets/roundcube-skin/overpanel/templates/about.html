<roundcube:object name="doctype" value="html5" />
<html>
<head>
<roundcube:include file="includes/head.html" />
<style>
body {
    background: #0E0E18 !important;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
}
.about-card {
    max-width: 420px;
    width: 100%;
    margin: 40px auto;
    background: rgba(15,15,25,0.8);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 44px 36px 36px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 40px rgba(233,30,140,0.04);
    text-align: center;
}
.about-logo {
    width: 64px;
    height: 64px;
    border-radius: 18px;
    background: linear-gradient(135deg, #E91E8C, #9B26D9);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
    box-shadow: 0 0 30px rgba(233,30,140,0.2);
}
.about-logo svg { width: 28px; height: 28px; fill: white; }
.about-title {
    font-size: 20px;
    font-weight: 800;
    background: linear-gradient(135deg, #E91E8C, #9B26D9);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 3px;
    margin-bottom: 6px;
}
.about-subtitle { color: #555; font-size: 12px; margin-bottom: 24px; }
.about-info { color: #888; font-size: 13px; line-height: 2; }
.about-info strong { color: #ccc; font-weight: 600; }
.about-divider {
    border: none;
    border-top: 1px solid rgba(255,255,255,0.06);
    margin: 20px 0;
}
.about-footer { color: #333; font-size: 11px; }
</style>
</head>
<body class="task-settings action-about">

<div class="about-card">
    <div class="about-logo">
        <svg viewBox="0 0 24 24"><path d="M12 2L8.5 8.5H2L7 13l-2 7 7-4.5L19 20l-2-7 5-4.5h-6.5L12 2z"/></svg>
    </div>
    <h1 class="about-title">OVERPANEL</h1>
    <p class="about-subtitle">Webmail Interface</p>

    <div class="about-info">
        <roundcube:object name="productname" /> <roundcube:object name="version" /><br />
        <strong>Roundcube Webmail</strong><br />
        <roundcube:object name="pluginlist" />
    </div>

    <hr class="about-divider" />

    <p class="about-footer">
        Powered by OVERMEDIA
    </p>
</div>

<roundcube:object name="scripts" type="foot" />
</body>
</html>
