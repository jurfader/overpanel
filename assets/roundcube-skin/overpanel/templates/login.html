<roundcube:object name="doctype" value="html5" />
<html>
<head>
<title><roundcube:object name="pagetitle" /></title>
<roundcube:include file="includes/head.html" />
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    min-height: 100vh;
    background: #0A0A0F;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    color: #e0e0e0;
}
.login-wrapper {
    width: 100%;
    max-width: 420px;
    padding: 20px;
}
.login-logo {
    text-align: center;
    margin-bottom: 32px;
}
.login-logo .logo-icon {
    width: 64px;
    height: 64px;
    border-radius: 20px;
    background: linear-gradient(135deg, #E91E8C, #9B26D9);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
    box-shadow: 0 0 30px rgba(233,30,140,0.2);
}
.login-logo .logo-icon svg {
    width: 32px;
    height: 32px;
    fill: white;
}
.login-logo h1 {
    font-size: 24px;
    font-weight: 800;
    background: linear-gradient(135deg, #E91E8C, #9B26D9);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 2px;
}
.login-logo p {
    font-size: 13px;
    color: #666;
    margin-top: 4px;
}
.login-card {
    background: rgba(15,15,25,0.8);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 40px 32px;
    backdrop-filter: blur(20px);
    box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 30px rgba(233,30,140,0.05);
}
.login-card h2 {
    font-size: 20px;
    font-weight: 700;
    color: #f0f0f0;
    margin-bottom: 6px;
}
.login-card .subtitle {
    font-size: 13px;
    color: #666;
    margin-bottom: 28px;
}
.form-group {
    margin-bottom: 20px;
}
.form-group label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
}
.form-group .input-wrap {
    position: relative;
}
.form-group .input-wrap .icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: #555;
    width: 18px;
    height: 18px;
}
.form-group input[type="text"],
.form-group input[type="password"] {
    width: 100%;
    height: 48px;
    padding: 0 16px 0 44px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    color: #e0e0e0;
    font-size: 14px;
    outline: none;
    transition: all 0.2s;
}
.form-group input:focus {
    border-color: rgba(233,30,140,0.5);
    box-shadow: 0 0 0 3px rgba(233,30,140,0.08);
    background: rgba(255,255,255,0.06);
}
.form-group input::placeholder {
    color: #555;
}
.login-btn {
    width: 100%;
    height: 52px;
    background: linear-gradient(135deg, #E91E8C, #9B26D9);
    border: none;
    border-radius: 16px;
    color: white;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 0 20px rgba(233,30,140,0.15);
    text-transform: uppercase;
    margin-top: 8px;
}
.login-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(233,30,140,0.3);
}
.login-footer {
    text-align: center;
    margin-top: 24px;
    font-size: 12px;
    color: #444;
}
.error-msg {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 20px;
    color: #ef4444;
    font-size: 13px;
}
</style>
</head>
<body class="login-page">

<div class="login-wrapper">
    <div class="login-logo">
        <div class="logo-icon">
            <svg viewBox="0 0 24 24"><path d="M12 2L8.5 8.5H2L7 13l-2 7 7-4.5L19 20l-2-7 5-4.5h-6.5L12 2z"/></svg>
        </div>
        <h1>OVERPANEL</h1>
        <p>Webmail</p>
    </div>

    <div class="login-card">
        <h2>Zaloguj się</h2>
        <p class="subtitle">Wprowadź dane dostępowe</p>

        <roundcube:object name="loginform" form="login-form" noheader="true" />
    </div>

    <div class="login-footer">
        Powered by OVERMEDIA
    </div>
</div>

<script>
// Style the generated form elements
document.addEventListener('DOMContentLoaded', function() {
    var form = document.getElementById('login-form') || document.querySelector('form');
    if (!form) return;

    // Style inputs
    var inputs = form.querySelectorAll('input[type="text"], input[type="password"]');
    inputs.forEach(function(input) {
        input.style.cssText = 'width:100%;height:48px;padding:0 16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:14px;color:#e0e0e0;font-size:14px;outline:none;';
        input.addEventListener('focus', function() {
            this.style.borderColor = 'rgba(233,30,140,0.5)';
            this.style.boxShadow = '0 0 0 3px rgba(233,30,140,0.08)';
        });
        input.addEventListener('blur', function() {
            this.style.borderColor = 'rgba(255,255,255,0.1)';
            this.style.boxShadow = 'none';
        });
    });

    // Style submit button
    var submit = form.querySelector('input[type="submit"], button[type="submit"]');
    if (submit) {
        submit.className = 'login-btn';
        submit.style.cssText = 'width:100%;height:52px;background:linear-gradient(135deg,#E91E8C,#9B26D9);border:none;border-radius:16px;color:white;font-size:15px;font-weight:700;letter-spacing:1px;cursor:pointer;text-transform:uppercase;margin-top:8px;box-shadow:0 0 20px rgba(233,30,140,0.15);';
    }

    // Style labels
    var labels = form.querySelectorAll('label, td.title');
    labels.forEach(function(label) {
        label.style.cssText = 'display:block;font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;';
    });

    // Hide default styling
    var tables = form.querySelectorAll('table');
    tables.forEach(function(table) {
        table.style.width = '100%';
        var tds = table.querySelectorAll('td');
        tds.forEach(function(td) { td.style.padding = '6px 0'; td.style.display = 'block'; });
    });
});
</script>

</body>
</html>
