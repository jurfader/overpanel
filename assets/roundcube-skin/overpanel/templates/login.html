<roundcube:object name="doctype" value="html5" />
<html>
<head>
<title><roundcube:object name="pagetitle" /></title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
    min-height: 100vh;
    background: #0A0A0F;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    color: #e0e0e0;
}
.login-wrapper {
    width: 100%;
    max-width: 440px;
    padding: 24px;
}

/* Logo */
.login-logo {
    text-align: center;
    margin-bottom: 36px;
}
.login-logo .logo-icon {
    width: 72px;
    height: 72px;
    border-radius: 22px;
    background: linear-gradient(135deg, #E91E8C, #9B26D9);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 18px;
    box-shadow: 0 0 40px rgba(233,30,140,0.2);
}
.login-logo .logo-icon svg { width: 36px; height: 36px; fill: white; }
.login-logo h1 {
    font-size: 26px;
    font-weight: 800;
    background: linear-gradient(135deg, #E91E8C, #9B26D9);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 3px;
}
.login-logo p { font-size: 13px; color: #555; margin-top: 4px; }

/* Card */
.login-card {
    background: rgba(15,15,25,0.8);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 44px 36px 36px;
    backdrop-filter: blur(20px);
    box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 40px rgba(233,30,140,0.04);
}
.login-card h2 { font-size: 22px; font-weight: 700; color: #f0f0f0; margin-bottom: 6px; }
.login-card .subtitle { font-size: 13px; color: #666; margin-bottom: 32px; }

/* Override Roundcube form */
.login-card table { width: 100% !important; border-collapse: collapse !important; }
.login-card table tr { display: block !important; margin-bottom: 20px !important; }
.login-card table td { display: block !important; width: 100% !important; padding: 0 !important; border: none !important; }
.login-card table td.title,
.login-card table label {
    font-size: 11px !important;
    font-weight: 600 !important;
    color: #777 !important;
    text-transform: uppercase !important;
    letter-spacing: 1px !important;
    margin-bottom: 8px !important;
    display: block !important;
}
.login-card table td.input { padding-top: 0 !important; }

.login-card input[type="text"],
.login-card input[type="password"],
.login-card input[name="_user"],
.login-card input[name="_pass"] {
    width: 100% !important;
    height: 52px !important;
    padding: 0 18px !important;
    background: rgba(255,255,255,0.04) !important;
    border: 1px solid rgba(255,255,255,0.1) !important;
    border-radius: 14px !important;
    color: #e0e0e0 !important;
    font-size: 15px !important;
    outline: none !important;
    transition: all 0.2s !important;
    -webkit-appearance: none !important;
    appearance: none !important;
    box-sizing: border-box !important;
}
.login-card input[type="text"]:focus,
.login-card input[type="password"]:focus {
    border-color: rgba(233,30,140,0.5) !important;
    box-shadow: 0 0 0 3px rgba(233,30,140,0.08) !important;
    background: rgba(255,255,255,0.06) !important;
}
.login-card input::placeholder { color: #555 !important; }

/* Submit button */
.login-card input[type="submit"],
.login-card button[type="submit"],
.login-card .mainaction,
.login-card .button.mainaction {
    width: 100% !important;
    height: 54px !important;
    background: linear-gradient(135deg, #E91E8C, #9B26D9) !important;
    border: none !important;
    border-radius: 16px !important;
    color: white !important;
    font-size: 15px !important;
    font-weight: 700 !important;
    letter-spacing: 1.5px !important;
    cursor: pointer !important;
    text-transform: uppercase !important;
    margin-top: 12px !important;
    box-shadow: 0 0 25px rgba(233,30,140,0.15) !important;
    transition: all 0.2s !important;
    -webkit-appearance: none !important;
    appearance: none !important;
}
.login-card input[type="submit"]:hover {
    transform: translateY(-2px) !important;
    box-shadow: 0 8px 30px rgba(233,30,140,0.3) !important;
}

/* Hide elements we don't need */
.login-card .formbuttons { text-align: center !important; margin-top: 8px !important; }
.login-card select { display: none !important; }
.login-card .icon { display: none !important; }

/* Error message */
.login-card .error, .message.error, #message .error,
.login-card .warning {
    background: rgba(239,68,68,0.1) !important;
    border: 1px solid rgba(239,68,68,0.2) !important;
    border-radius: 12px !important;
    padding: 12px 16px !important;
    margin-bottom: 20px !important;
    color: #ef4444 !important;
    font-size: 13px !important;
}

/* Submit button */
.login-btn {
    width: 100% !important;
    height: 54px !important;
    background: linear-gradient(135deg, #E91E8C, #9B26D9) !important;
    border: none !important;
    border-radius: 16px !important;
    color: white !important;
    font-size: 15px !important;
    font-weight: 700 !important;
    letter-spacing: 1.5px !important;
    cursor: pointer !important;
    text-transform: uppercase !important;
    margin-top: 24px !important;
    box-shadow: 0 0 25px rgba(233,30,140,0.15) !important;
    transition: all 0.2s !important;
    display: block !important;
}
.login-btn:hover {
    transform: translateY(-2px) !important;
    box-shadow: 0 8px 30px rgba(233,30,140,0.3) !important;
}

/* Footer */
.login-footer {
    text-align: center;
    margin-top: 28px;
    font-size: 12px;
    color: #333;
}
</style>
</head>
<body class="login-page">

<div class="login-wrapper">
    <div class="login-logo">
        <div class="logo-icon">
            <svg viewBox="0 0 24 24"><path d="M12 2L8.5 8.5H2L7 13l-2 7 7-4.5L19 20l-2-7 5-4.5h-6.5L12 2z"/></svg>
        </div>
        <h1><roundcube:object name="productname" /></h1>
        <p>Webmail</p>
    </div>

    <div class="login-card">
        <h2>Zaloguj się</h2>
        <p class="subtitle">Wprowadź dane dostępowe</p>

        <roundcube:object name="message" id="message" />
        <roundcube:object name="loginform" />
        <button type="submit" class="login-btn" onclick="document.querySelector('form').submit()">Zaloguj się</button>
    </div>

    <div class="login-footer">
        Powered by OVERMEDIA
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Add placeholder text
    var userInput = document.getElementById('rcmloginuser');
    var passInput = document.getElementById('rcmloginpwd');
    if (userInput) userInput.placeholder = 'jan@example.com';
    if (passInput) passInput.placeholder = '••••••••';

    // Make button submit the form
    var btn = document.querySelector('.login-btn');
    var form = document.querySelector('form');
    if (btn && form) {
        btn.addEventListener('click', function(e) {
            e.preventDefault();
            form.submit();
        });
    }
});
</script>

</body>
</html>
