<roundcube:object name="doctype" value="html5" />
<html>
<head>
<roundcube:include file="includes/head.html" />
<style>
body { background: #0E0E18 !important; }

.response-header {
    padding: 20px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    gap: 12px;
}
.response-icon {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}
.response-icon svg { width: 18px; height: 18px; fill: white; }

.response-form {
    padding: 20px 24px;
}
.response-form fieldset {
    border: 1px solid rgba(255,255,255,0.06) !important;
    border-radius: 14px !important;
    padding: 18px 20px !important;
    margin-bottom: 16px !important;
    background: rgba(255,255,255,0.02) !important;
}
.response-form legend {
    color: #E91E8C !important;
    font-size: 10px !important;
    font-weight: 700 !important;
    text-transform: uppercase !important;
    letter-spacing: 1.5px !important;
    padding: 0 8px !important;
}
.response-form label {
    font-size: 11px;
    color: #666;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: block;
    margin-bottom: 6px;
}
.response-form input[type="text"] {
    width: 100% !important;
    background: rgba(255,255,255,0.03) !important;
    border: 1px solid rgba(255,255,255,0.08) !important;
    border-radius: 10px !important;
    color: #e0e0e0 !important;
    padding: 9px 14px !important;
    font-size: 13px !important;
    margin-bottom: 14px !important;
}
.response-form textarea {
    width: 100% !important;
    min-height: 200px !important;
    background: rgba(255,255,255,0.03) !important;
    border: 1px solid rgba(255,255,255,0.08) !important;
    border-radius: 12px !important;
    color: #e0e0e0 !important;
    padding: 14px !important;
    font-size: 13px !important;
    line-height: 1.6 !important;
    resize: vertical !important;
}
.response-form input:focus,
.response-form textarea:focus {
    border-color: rgba(233,30,140,0.4) !important;
    box-shadow: 0 0 0 3px rgba(233,30,140,0.06) !important;
    outline: none !important;
}

.formbuttons {
    padding: 16px 24px !important;
    display: flex !important;
    gap: 10px !important;
    border-top: 1px solid rgba(255,255,255,0.06) !important;
}
</style>
</head>
<body class="task-settings action-edit-response">

<roundcube:object name="message" id="message" />

<div class="response-header">
    <div class="response-icon op-gradient">
        <svg viewBox="0 0 24 24"><path d="M10 9V5l-7 7 7 7v-4.1c5 0 8.5 1.6 11 5.1-1-5-4-10-11-11z"/></svg>
    </div>
    <div>
        <h2 style="font-size:18px;font-weight:700;color:#f0f0f0;margin:0;">
            <roundcube:object name="pagetitle" />
        </h2>
        <p style="font-size:12px;color:#555;margin-top:2px;">
            <roundcube:label name="responses" />
        </p>
    </div>
</div>

<div class="response-form">
    <roundcube:object name="responseform" id="response-details" />
</div>

<div class="formbuttons">
    <roundcube:button command="save" type="input" class="btn-primary mainaction"
        label="save" />
    <roundcube:button command="delete" type="input" class="btn-danger"
        label="delete" />
</div>

<roundcube:object name="scripts" type="foot" />
</body>
</html>
