<roundcube:object name="doctype" value="html5" />
<html>
<head>
<roundcube:include file="includes/head.html" />
<style>
body { background: #0E0E18 !important; }

.import-card {
    max-width: 480px;
    margin: 40px auto;
    background: rgba(15,15,25,0.8);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 36px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 25px 60px rgba(0,0,0,0.5);
}
.import-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 24px;
}
.import-icon {
    width: 44px;
    height: 44px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}
.import-icon svg { width: 20px; height: 20px; fill: white; }

.import-card label {
    font-size: 11px;
    color: #666;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: block;
    margin-bottom: 6px;
}
.import-card input[type="file"] {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    color: #bbb;
    padding: 12px 16px;
    font-size: 13px;
    margin-bottom: 16px;
}
.import-card select {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    color: #e0e0e0;
    padding: 10px 14px;
    font-size: 13px;
    margin-bottom: 16px;
}

.import-dropzone {
    border: 2px dashed rgba(233,30,140,0.15);
    border-radius: 16px;
    padding: 30px 20px;
    text-align: center;
    margin-bottom: 20px;
    transition: all 0.2s;
}
.import-dropzone:hover {
    border-color: rgba(233,30,140,0.3);
    background: rgba(233,30,140,0.02);
}
.import-dropzone svg { width: 32px; height: 32px; fill: #444; margin-bottom: 8px; }
.import-dropzone p { font-size: 12px; color: #555; }

.import-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
}
</style>
</head>
<body class="task-addressbook action-import">

<div class="import-card">
    <div class="import-header">
        <div class="import-icon op-gradient">
            <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
        </div>
        <div>
            <h2 style="font-size:18px;font-weight:700;color:#f0f0f0;margin:0;">
                <roundcube:label name="importcontacts" />
            </h2>
            <p style="font-size:12px;color:#555;margin-top:2px;">vCard / CSV</p>
        </div>
    </div>

    <roundcube:object name="message" id="message" />

    <roundcube:object name="importform" id="import-form" />

    <div class="import-actions">
        <roundcube:button command="import" type="input" class="btn-primary mainaction"
            label="import" />
    </div>
</div>

<roundcube:object name="scripts" type="foot" />
</body>
</html>
