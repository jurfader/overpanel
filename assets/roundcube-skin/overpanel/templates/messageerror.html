<html>

<style>
body {
    background: #0E0E18 !important;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
}
.error-card {
    max-width: 420px;
    width: 100%;
    margin: 40px auto;
    background: rgba(15,15,25,0.8);
    border: 1px solid rgba(239,68,68,0.15);

    text-align: center;
}
.error-icon {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: rgba(239,68,68,0.1);
    border: 2px solid rgba(239,68,68,0.2);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;

.error-icon svg { width: 28px; height: 28px; fill: #ef4444; }
.error-card h2 { font-size: 18px; font-weight: 700; color: #f0f0f0; margin-bottom: 8px; }
.error-card p { font-size: 13px; color: #888; line-height: 1.6; }
.error-card .error-message {
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.15);
    border-radius: 12px;
    padding: 12px 16px;
    margin-top: 20px;
    color: #fca5a5;
    font-size: 13px;
