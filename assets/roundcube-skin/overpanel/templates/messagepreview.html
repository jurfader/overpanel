<roundcube:object name="doctype" value="html5" />
<html>
<head>
<roundcube:include file="includes/head.html" />
<style>
/* ── Message preview (loaded inside iframe/content pane) ── */
body {
    background: #0E0E18 !important;
    padding: 0 !important;
    margin: 0 !important;
}

/* Message header block */
#messageheaderbox, .messageheaderbox {
    background: rgba(14,14,24,0.98) !important;
    border-bottom: 1px solid rgba(255,255,255,0.06) !important;
    padding: 20px 24px !important;
}
.messageheaderbox .header-title,
.messageheaderbox td.header-title {
    color: #555 !important;
    font-size: 10px !important;
    text-transform: uppercase !important;
    letter-spacing: 0.5px !important;
    font-weight: 600 !important;
    padding: 3px 8px 3px 0 !important;
    white-space: nowrap !important;
    vertical-align: top !important;
    width: 60px !important;
}
.messageheaderbox .header,
.messageheaderbox td.header {
    color: #ccc !important;
    font-size: 13px !important;
    padding: 3px 0 !important;
}
.messageheaderbox h2.subject {
    font-size: 20px !important;
    font-weight: 700 !important;
    color: #f0f0f0 !important;
    margin-bottom: 12px !important;
    line-height: 1.3 !important;
}

/* Message objects (attachments bar etc) */
#messageobjects {
    padding: 0 24px !important;
}
#messageobjects .notice, #messageobjects .warning, #messageobjects .error {
    background: rgba(14,14,24,0.95) !important;
    border: 1px solid rgba(255,255,255,0.08) !important;
    border-radius: 12px !important;
    padding: 10px 16px !important;
    margin: 12px 0 !important;
    color: #ccc !important;
    font-size: 12px !important;
}
#messageobjects .error { border-left: 3px solid #ef4444 !important; }
#messageobjects .warning { border-left: 3px solid #fbbf24 !important; }

/* Attachment list in message view */
.attachmentslist {
    background: rgba(255,255,255,0.02) !important;
    border: 1px solid rgba(255,255,255,0.06) !important;
    border-radius: 12px !important;
    padding: 8px 12px !important;
    margin: 12px 24px !important;
}
.attachmentslist li {
    display: inline-flex !important;
    align-items: center !important;
    gap: 6px !important;
    margin: 3px 6px 3px 0 !important;
}
.attachmentslist li a {
    background: rgba(255,255,255,0.04) !important;
    border: 1px solid rgba(255,255,255,0.06) !important;
    border-radius: 8px !important;
    padding: 5px 10px !important;
    color: #bbb !important;
    font-size: 11px !important;
    text-decoration: none !important;
    transition: all 0.15s !important;
}
.attachmentslist li a:hover {
    background: rgba(233,30,140,0.06) !important;
    border-color: rgba(233,30,140,0.15) !important;
    color: #E91E8C !important;
}

/* Message body content area */
#messagebody, .message-htmlpart, .message-part {
    padding: 24px !important;
    background: #0E0E18 !important;
    color: #d0d0d0 !important;
    line-height: 1.6 !important;
    font-size: 14px !important;
}
</style>
</head>
<body class="task-mail action-preview">

<roundcube:object name="message" id="message" />

<div id="message-header">
    <roundcube:object name="messageHeaders" id="messageheaderbox"
        class="messageheaderbox" />
</div>

<div id="message-objects">
    <roundcube:object name="messageObjects" id="messageobjects" />
</div>

<div id="message-body">
    <roundcube:object name="messageBody" id="messagebody"
        class="message-htmlpart" />
</div>

<roundcube:object name="scripts" type="foot" />
</body>
</html>
