<roundcube:object name="doctype" value="html5" />
<html>
<head>
<roundcube:include file="includes/head.html" />
<style>
body { background: #0E0E18 !important; }

.identity-header {
    padding: 20px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    gap: 12px;
}
.identity-icon {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}
.identity-icon svg { width: 18px; height: 18px; fill: white; }

#identity-details {
    padding: 20px 24px !important;
}
#identity-details fieldset {
    border: 1px solid rgba(255,255,255,0.06) !important;
    border-radius: 14px !important;
    padding: 18px 20px !important;
    margin-bottom: 16px !important;
    background: rgba(255,255,255,0.02) !important;
}
#identity-details legend {
    color: #E91E8C !important;
    font-size: 10px !important;
    font-weight: 700 !important;
    text-transform: uppercase !important;
    letter-spacing: 1.5px !important;
    padding: 0 8px !important;
}
#identity-details table {
    width: 100% !important;
    border-collapse: collapse !important;
}
#identity-details td {
    padding: 8px 6px !important;
    border: none !important;
    border-bottom: 1px solid rgba(255,255,255,0.03) !important;
    color: #bbb !important;
    font-size: 13px !important;
}
#identity-details td.title {
    color: #999 !important;
    font-weight: 500 !important;
    width: 140px !important;
}
#identity-details input[type="text"],
#identity-details input[type="email"],
#identity-details textarea,
#identity-details select {
    width: 100% !important;
    background: rgba(255,255,255,0.03) !important;
    border: 1px solid rgba(255,255,255,0.08) !important;
    border-radius: 10px !important;
    color: #e0e0e0 !important;
    padding: 9px 14px !important;
    font-size: 13px !important;
}
#identity-details input:focus,
#identity-details textarea:focus {
    border-color: rgba(233,30,140,0.4) !important;
    box-shadow: 0 0 0 3px rgba(233,30,140,0.06) !important;
    outline: none !important;
}

.formbuttons {
    padding: 16px 24px !important;
    display: flex !important;
    gap: 10px !important;
    border-top: 1px solid rgba(255,255,255,0.06) !important;
}
</style>
</head>
<body class="task-settings action-edit-identity">

<roundcube:object name="message" id="message" />

<div class="identity-header">
    <div class="identity-icon op-gradient">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
    </div>
    <div>
        <h2 style="font-size:18px;font-weight:700;color:#f0f0f0;margin:0;">
            <roundcube:object name="pagetitle" />
        </h2>
        <p style="font-size:12px;color:#555;margin-top:2px;">
            <roundcube:label name="editidentity" />
        </p>
    </div>
</div>

<roundcube:object name="identityform" id="identity-details" />

<div class="formbuttons">
    <roundcube:button command="save" type="input" class="btn-primary mainaction"
        label="save" />
    <roundcube:button command="delete" type="input" class="btn-danger"
        label="delete" />
</div>

<roundcube:object name="scripts" type="foot" />
</body>
</html>
