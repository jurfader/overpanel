<roundcube:object name="doctype" value="html5" />
<html>
<head>
<roundcube:include file="includes/head.html" />
<style>
/* ── Contact edit form ── */
body {
    background: #0E0E18 !important;
}

.contact-edit-header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 24px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
}

#contactphoto {
    width: 72px !important;
    height: 72px !important;
    border-radius: 50% !important;
    background: linear-gradient(135deg, rgba(233,30,140,0.15), rgba(155,38,217,0.1)) !important;
    border: 2px solid rgba(233,30,140,0.15) !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    overflow: hidden !important;
    flex-shrink: 0 !important;
}

/* Field groups in edit form */
.contactfieldgroup, fieldset {
    border: 1px solid rgba(255,255,255,0.06) !important;
    border-radius: 14px !important;
    padding: 16px 20px !important;
    margin: 12px 24px !important;
    background: rgba(255,255,255,0.02) !important;
}
.contactfieldgroup legend, fieldset legend {
    color: #E91E8C !important;
    font-size: 10px !important;
    font-weight: 700 !important;
    text-transform: uppercase !important;
    letter-spacing: 1.5px !important;
    padding: 0 8px !important;
}

.contactfieldgroup .row, .contactfieldgroup tr {
    border-bottom: 1px solid rgba(255,255,255,0.03) !important;
    padding: 6px 0 !important;
}
.contactfieldgroup label, .contactfieldgroup td.label {
    font-size: 11px !important;
    color: #666 !important;
    font-weight: 600 !important;
    text-transform: uppercase !important;
    letter-spacing: 0.5px !important;
    display: block !important;
    margin-bottom: 4px !important;
}
.contactfieldgroup input[type="text"],
.contactfieldgroup input[type="email"],
.contactfieldgroup textarea {
    width: 100% !important;
    background: rgba(255,255,255,0.03) !important;
    border: 1px solid rgba(255,255,255,0.08) !important;
    border-radius: 10px !important;
    color: #e0e0e0 !important;
    padding: 9px 14px !important;
    font-size: 13px !important;
    transition: all 0.2s !important;
}
.contactfieldgroup input:focus,
.contactfieldgroup textarea:focus {
    border-color: rgba(233,30,140,0.4) !important;
    box-shadow: 0 0 0 3px rgba(233,30,140,0.06) !important;
    outline: none !important;
}

/* Save / delete buttons in form */
.formbuttons {
    padding: 16px 24px !important;
    display: flex !important;
    gap: 10px !important;
    border-top: 1px solid rgba(255,255,255,0.06) !important;
    margin-top: 12px !important;
}
</style>
</head>
<body class="task-addressbook action-edit">

<roundcube:object name="message" id="message" />

<div class="contact-edit-header">
    <roundcube:object name="contactphoto" id="contactphoto" />
    <div>
        <h2 style="font-size:18px;font-weight:700;color:#f0f0f0;margin:0;">
            <roundcube:label name="editcontact" />
        </h2>
        <p style="font-size:12px;color:#555;margin-top:2px;">
            <roundcube:label name="properties" />
        </p>
    </div>
</div>

<roundcube:object name="contacteditform" id="contacteditform" />

<div class="formbuttons">
    <roundcube:button command="save" type="input" class="btn-primary mainaction"
        label="save" />
</div>

<roundcube:object name="scripts" type="foot" />
</body>
</html>
