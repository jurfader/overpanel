<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />

<style>
/* ═══════════════════════════════════════════════════════════════════════════
   OVERPANEL Webmail — Global Template Styles
   Inline styles that supplement styles.css for template-level overrides
   ═══════════════════════════════════════════════════════════════════════════ */

/* ── Reset & base ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
    background: #0A0A0F !important;
    color: #d0d0d0 !important;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
}

/* ── Glass utilities ── */
.op-glass {
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.06);
}
.op-glass-bright {
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.10);
}
.op-glass-card {
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.07);
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    border-radius: 16px;
}

/* ── Gradient brand ── */
.op-gradient { background: linear-gradient(135deg, #E91E8C 0%, #9B26D9 100%); }
.op-gradient-text {
    background: linear-gradient(135deg, #E91E8C 0%, #9B26D9 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}
.op-gradient-subtle { background: linear-gradient(135deg, rgba(233,30,140,0.08), rgba(155,38,217,0.08)); }
.op-glow { box-shadow: 0 0 20px rgba(233,30,140,0.15); }

/* ── Layout shell ── */
#layout {
    display: flex !important;
    min-height: 100vh !important;
    background: #0A0A0F !important;
}
#layout > div {
    border-color: rgba(255,255,255,0.06) !important;
}

/* ── Header / Toolbar area ── */
.op-topbar,
#layout > .header,
.layout > .header {
    height: 56px;
    background: rgba(10,10,15,0.95) !important;
    border-bottom: 1px solid rgba(255,255,255,0.06) !important;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    display: flex;
    align-items: center;
    padding: 0 16px;
    position: sticky;
    top: 0;
    z-index: 30;
}

/* ── Page title in header ── */
.op-page-title {
    font-size: 15px;
    font-weight: 600;
    color: #f0f0f0;
    margin-right: auto;
    display: flex;
    align-items: center;
    gap: 10px;
}
.op-page-title .op-icon {
    width: 28px;
    height: 28px;
    border-radius: 10px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}
.op-page-title .op-icon svg { width: 14px; height: 14px; fill: white; }
.op-page-subtitle {
    font-size: 11px;
    color: #555;
    font-weight: 400;
    margin-left: 4px;
}

/* ── Branding in sidebar header ── */
.op-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
}
.op-brand-icon {
    width: 32px;
    height: 32px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 0 15px rgba(233,30,140,0.15);
}
.op-brand-icon svg { width: 16px; height: 16px; fill: white; }
.op-brand-text {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 2px;
}
.op-brand-sub {
    font-size: 9px;
    color: #555;
    margin-top: -2px;
    display: block;
}

/* ── Content area backgrounds ── */
#layout-content,
.layout-content,
#layout-list,
.layout-list,
#layout-sidebar,
.layout-sidebar {
    background: #0A0A0F !important;
}
#layout-content .scroller,
.layout-content .scroller {
    background: #0E0E18 !important;
}

/* ── No-messages placeholder ── */
.op-empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    text-align: center;
}
.op-empty-state svg {
    width: 48px;
    height: 48px;
    fill: #333;
    margin-bottom: 16px;
}
.op-empty-state h3 {
    font-size: 16px;
    color: #555;
    font-weight: 600;
    margin-bottom: 6px;
}
.op-empty-state p {
    font-size: 13px;
    color: #333;
}

/* ── Badge ── */
.op-badge {
    background: linear-gradient(135deg, #E91E8C, #9B26D9);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 1px 7px;
    border-radius: 8px;
    min-width: 18px;
    text-align: center;
    box-shadow: 0 0 8px rgba(233,30,140,0.2);
}

/* ── Footer / Powered by ── */
.op-footer {
    text-align: center;
    padding: 10px;
    font-size: 10px;
    color: #222;
    border-top: 1px solid rgba(255,255,255,0.04);
}

/* ── Compose specific ── */
#compose-content { background: #0E0E18 !important; }
.compose-header-table td { padding: 4px 8px !important; }
.compose-header-table label {
    font-size: 11px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
}

/* ── Contacts specific ── */
.contact-header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 24px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
}
.contact-avatar {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
}

/* ── Settings specific ── */
.settings-section {
    padding: 20px 24px;
}
.settings-section h3 {
    font-size: 11px;
    font-weight: 700;
    color: #E91E8C;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 16px;
}

/* ── Loading spinner ── */
.op-spinner {
    width: 24px;
    height: 24px;
    border: 2px solid rgba(255,255,255,0.06);
    border-top-color: #E91E8C;
    border-radius: 50%;
    animation: op-spin 0.8s linear infinite;
}
@keyframes op-spin { to { transform: rotate(360deg); } }

/* ── Override elastic hidden elements we do not need ── */
.voice { display: none !important; }
</style>

<roundcube:object name="scripts" type="head" />
