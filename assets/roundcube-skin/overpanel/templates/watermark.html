<roundcube:object name="doctype" value="html5" />
<html>
<head>
<meta charset="UTF-8" />
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
    background: #0E0E18;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
.watermark {
    text-align: center;
    opacity: 0.4;
    user-select: none;
    -webkit-user-select: none;
}
.watermark-icon {
    width: 56px;
    height: 56px;
    border-radius: 16px;
    background: linear-gradient(135deg, rgba(233,30,140,0.12), rgba(155,38,217,0.08));
    border: 1px solid rgba(233,30,140,0.08);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
}
.watermark-icon svg { width: 24px; height: 24px; fill: rgba(233,30,140,0.3); }
.watermark h2 {
    font-size: 14px;
    font-weight: 700;
    color: #333;
    letter-spacing: 3px;
    margin-bottom: 6px;
}
.watermark p {
    font-size: 12px;
    color: #222;
}
</style>
</head>
<body>
<div class="watermark">
    <div class="watermark-icon">
        <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
    </div>
    <h2>OVERPANEL</h2>
    <p>Wybierz wiadomość aby wyświetlić</p>
</div>
</body>
</html>
